name: Periodic health check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check the deployed service URL
        uses: jtalk/url-health-check-action@v5
        with:
          url: https://fs-pokedex-wcuv.onrender.com/health
          max-attempts: 2
          retry-delay: 5s

