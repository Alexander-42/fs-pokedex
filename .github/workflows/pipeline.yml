name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
    
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: 
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Check style
        run: npm run eslint
      - name: Run build
        run: npm run build
      - name: Run tests
        run: npm run test
      - name: Run Playwright tests
        run: npm run test:e2e
  
  deploy:
    needs: [build_and_test]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment on render
        if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ' '), '#skip') }}
        run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}
  
  tag_release:
    needs: [deploy]
    if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ' '), '#skip') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          DRY_RUN: true
  
  success_notification:
    needs: [deploy]
    runs-on: ubuntu-latest
    if: ${{ needs.deploy.result == 'success' && github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v6
      - uses: sarisia/actions-status-discord@v1.16.0
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ needs.deploy.result }}
          content: ":white_check_mark: **Deployment Successful!** A new version deployed to production"
          title: "Deployment Details"
          nodetail: true
          notimestamp: true
          description: |
            **Commit:** ${{ github.sha }}
            **Message:** ${{ github.event.head_commit.message }}
            **Author:** ${{ github.actor }}

  failure_notification:
    needs:
      - build_and_test
      - deploy
      - tag_release
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Check if pipeline failed
        run: |
          echo "BUILD=${{ needs.build_and_test.result }}"
          echo "DEPLOY=${{ needs.deploy.result }}"
          echo "TAG=${{ needs.tag_release.result }}"

          if [ "${{ needs.build_and_test.result }}" = "failure" ] || \
            [ "${{ needs.deploy.result }}" = "failure" ] || \
            [ "${{ needs.tag_release.result }}" = "failure" ]; then
            echo "PIPELINE_FAILED=true" >> $GITHUB_ENV
          else
            echo "PIPELINE_FAILED=false" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v6
      - name: Get commit message
        run: echo "COMMIT_MESSAGE=$(git log -1 --pretty=%s)" >> $GITHUB_ENV
      
      - uses: sarisia/actions-status-discord@v1.16.0
        if: env.PIPELINE_FAILED == 'true'
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
          content: ":x: **Pipeline Failed!** The pipeline encountered an error"
          title: "Failure Details"
          notimestamp: true
          nodetail: true
          description: |
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Message:** ${{ env.COMMIT_MESSAGE }}
            **Author:** ${{ github.actor }}
            **Workflow:** ${{ github.workflow }}
            **Jobs:**
              **Build:** ${{ needs.build_and_test.result }}
              **Deploy:** ${{ needs.deploy.result }}
              **Release:** ${{ needs.tag_release.result }}

            [view commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            [view commit](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})